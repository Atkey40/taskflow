<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASKFLOW — タスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f1f8;
    --border: #dde0ef;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --warn: #f7971e;
    --text: #1a1a2e;
    --muted: #8888aa;
    --danger: #e63946;
    --safe: #2a9d5c;
  }

  /* ダークモード */
  [data-theme="dark"] {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3f;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --danger: #ff4757;
    --safe: #2ed573;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(245,246,250,0.92);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(108,99,255,0.3);
  }
  .btn-primary:hover { background: #7d75ff; transform: translateY(-1px); box-shadow: 0 4px 24px rgba(108,99,255,0.5); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Dashboard Stats */
  .dashboard {
    padding: 28px 32px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 50%;
    opacity: 0.15;
    transform: translate(20px, -20px);
  }
  .stat-card.danger::before { background: var(--danger); }
  .stat-card.warn::before { background: var(--warn); }
  .stat-card.safe::before { background: var(--safe); }
  .stat-card.info::before { background: var(--accent); }

  .stat-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
  }
  .stat-card.danger .stat-value { color: var(--danger); }
  .stat-card.warn .stat-value { color: var(--warn); }
  .stat-card.safe .stat-value { color: var(--safe); }
  .stat-card.info .stat-value { color: var(--accent); }

  .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  /* Alert Banner */
  .alert-banner {
    margin: 0 32px 20px;
    background: linear-gradient(135deg, rgba(255,71,87,0.15), rgba(247,151,30,0.1));
    border: 1px solid rgba(255,71,87,0.4);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: rgba(255,71,87,0.4); }
    50% { border-color: rgba(255,71,87,0.9); }
  }

  .alert-icon { font-size: 1.3rem; }
  .alert-text { flex: 1; font-size: 0.85rem; }
  .alert-text strong { color: var(--danger); }

  /* Main content */
  .main { display: flex; gap: 0; flex: 1; }

  .task-section { flex: 1; padding: 0 32px 32px; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-tabs { display: flex; gap: 6px; }

  .tab {
    font-size: 0.7rem;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .task-card.priority-critical::before { background: var(--danger); }
  .task-card.priority-high::before { background: var(--warn); }
  .task-card.priority-medium::before { background: var(--accent); }
  .task-card.priority-low::before { background: var(--safe); }

  .task-card:hover { border-color: var(--accent); transform: translateX(4px); background: var(--surface2); }
  .task-card.overdue { border-color: rgba(255,71,87,0.4); background: rgba(255,71,87,0.04); }
  .task-card.completed { opacity: 0.45; }
  .task-card.completed .task-title { text-decoration: line-through; }

  /* Checkbox */
  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check.checked::after { content: '✓'; color: #fff; font-size: 0.75rem; font-weight: 700; }

  /* Task info */
  .task-info { flex: 1; min-width: 0; }

  .task-title {
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .task-badge {
    font-size: 0.65rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
  }

  .badge-critical { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
  .badge-high { background: rgba(247,151,30,0.15); color: var(--warn); border: 1px solid rgba(247,151,30,0.3); }
  .badge-medium { background: rgba(108,99,255,0.15); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); }
  .badge-low { background: rgba(46,213,115,0.15); color: var(--safe); border: 1px solid rgba(46,213,115,0.3); }

  .task-date {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .task-date.overdue { color: var(--danger); font-weight: 600; }
  .task-date.soon { color: var(--warn); font-weight: 600; }

  /* Score badge */
  .score-badge {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .score-90 { background: rgba(255,71,87,0.2); color: var(--danger); }
  .score-70 { background: rgba(247,151,30,0.2); color: var(--warn); }
  .score-50 { background: rgba(108,99,255,0.2); color: var(--accent); }
  .score-30 { background: rgba(46,213,115,0.2); color: var(--safe); }

  /* Buffer indicator */
  .buffer-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .buffer-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s;
  }

  /* Right sidebar */
  .sidebar {
    width: 320px;
    border-left: 1px solid var(--border);
    padding: 0 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex-shrink: 0;
  }

  .sidebar-section { }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 20px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }

  /* Notification log */
  [data-theme="dark"] header {
    background: rgba(10,10,15,0.8);
  }

  .notif-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .notif-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .notif-dot.red { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .notif-dot.orange { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .notif-dot.blue { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .notif-dot.green { background: var(--safe); }

  .notif-text { font-size: 0.78rem; color: var(--text); line-height: 1.5; }
  .notif-time { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

  /* Alert settings */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .setting-label { font-size: 0.82rem; display: flex; align-items: center; gap: 8px; }

  .toggle {
    width: 38px;
    height: 20px;
    background: var(--border);
    border-radius: 100px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 480px;
    max-width: 92vw;
    transform: translateY(20px);
    transition: transform 0.25s;
  }
  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 7px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .buffer-hint {
    font-size: 0.72rem;
    color: var(--accent);
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* Toast notifications */
  .toast-container {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 360px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(100%) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }

  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); max-height: 100px; }
    to { opacity: 0; transform: translateX(100%); max-height: 0; padding: 0; margin: 0; }
  }

  .toast.removing { animation: toastOut 0.3s ease forwards; }

  .toast::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    animation: toastProgress 5s linear forwards;
  }
  .toast.urgent::after { background: var(--danger); }
  .toast.warning::after { background: var(--warn); }
  .toast.success::after { background: var(--safe); }

  @keyframes toastProgress {
    from { width: 100%; }
    to { width: 0%; }
  }

  .toast-icon { font-size: 1.2rem; flex-shrink: 0; }
  .toast-content { flex: 1; }
  .toast-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; margin-bottom: 3px; }
  .toast-body { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }

  .toast-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .toast-close:hover { color: var(--text); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 0.85rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .dashboard { grid-template-columns: repeat(2, 1fr); }
    .sidebar { display: none; }
  }
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .dashboard { padding: 16px; }
    .task-section { padding: 0 16px 24px; }
  }

  .escalation-badge {
    font-size: 0.6rem;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: rgba(255,71,87,0.2);
    color: var(--danger);
    border: 1px solid rgba(255,71,87,0.3);
    animation: flash 1s infinite;
  }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .snooze-btn {
    font-size: 0.68rem;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .snooze-btn:hover { border-color: var(--warn); color: var(--warn); }

  /* ===== GOOGLE CALENDAR INTEGRATION ===== */
  .gcal-btn {
    font-size: 0.68rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(66,133,244,0.4);
    background: rgba(66,133,244,0.1);
    color: #4285f4;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .gcal-btn:hover { background: rgba(66,133,244,0.2); border-color: #4285f4; }
  .gcal-btn.synced { border-color: rgba(52,168,83,0.4); background: rgba(52,168,83,0.1); color: #34a853; }

  /* Google Connect Banner */
  .gcal-connect-bar {
    margin: 0 32px 16px;
    background: linear-gradient(135deg, rgba(66,133,244,0.12), rgba(52,168,83,0.08));
    border: 1px solid rgba(66,133,244,0.35);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .gcal-logo {
    width: 32px; height: 32px;
    background: white;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .gcal-connect-text { flex: 1; font-size: 0.82rem; line-height: 1.5; }
  .gcal-connect-text strong { color: #4285f4; }
  .gcal-connect-text .gcal-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .btn-gcal {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: #4285f4;
    color: white;
    box-shadow: 0 2px 12px rgba(66,133,244,0.35);
  }
  .btn-gcal:hover { background: #3574e2; transform: translateY(-1px); }
  .btn-gcal.connected { background: #34a853; box-shadow: 0 2px 12px rgba(52,168,83,0.35); }
  .btn-gcal.connected:hover { background: #2d9249; }

  /* Calendar Modal */
  .cal-modal { max-width: 540px; }

  .cal-account-box {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
  }
  .cal-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4285f4, #34a853);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;

  .cal-task-name { flex: 1; font-size: 0.82rem; }

  }
  .cal-option-label { font-size: 0.8rem; color: var(--text); }

  /* Sync animation */
  .syncing-overlay {
    position: fixed; inset: 0;

  .sync-steps { display: flex; flex-direction: column; gap: 10px; min-width: 260px; }

  .sync-step.active { color: var(--text); }

  .sync-step-dot {

  .sync-step.active .sync-step-dot { background: #4285f4; box-shadow: 0 0 8px #4285f4; }
  .sync-step.done .sync-step-dot { background: var(--safe); }

  /* Calendar mini view in sidebar */
  .mini-cal { }

    display: flex; align-items: center; justify-content: space-between;

  }

<script>
// ===== DATA =====
let tasks = [];
let notifLog = [];
let currentFilter = 'all';
let snoozedUntil = null;

const PRIORITY_SCORE = { critical: 100, high: 75, medium: 45, low: 20 };
const PRIORITY_LABEL = { critical: '重要', high: '高', medium: '中', low: '低' };
const BUFFER_DAYS = { critical: 3, high: 2, medium: 1, low: 0 };

// ===== SCORE CALCULATION =====
function calcScore(task) {
  if (task.completed) return 0;
  const now = new Date();
  const due = new Date(task.due);
  const diffDays = (due - now) / (1000 * 60 * 60 * 24);
  const urgency = diffDays < 0 ? 50 : diffDays < 1 ? 40 : diffDays < 3 ? 25 : diffDays < 7 ? 10 : 0;
  return PRIORITY_SCORE[task.priority] + urgency;
}

function getScoreClass(score) {
  if (score >= 90) return 'score-90';
  if (score >= 70) return 'score-70';
  if (score >= 50) return 'score-50';
  return 'score-30';
}

function getDaysLeft(dueStr) {
  const now = new Date();
  now.setHours(0,0,0,0);
  const due = new Date(dueStr);
  due.setHours(0,0,0,0);
  return Math.round((due - now) / (1000 * 60 * 60 * 24));
}

function getBufferFill(task) {
  const bufferDays = BUFFER_DAYS[task.priority];
  const daysLeft = getDaysLeft(task.due);
  if (daysLeft < 0) return 100;
  const start = bufferDays + 7;
  const pct = Math.max(0, Math.min(100, 100 - (daysLeft / start) * 100));
  return pct;
}

function getBufferColor(pct) {
  if (pct >= 90) return 'var(--danger)';
  if (pct >= 60) return 'var(--warn)';
  if (pct >= 30) return 'var(--accent)';
  return 'var(--safe)';
}

// ===== RENDER =====
function renderTasks() {
  const list = document.getElementById('task-list');
  let filtered = [...tasks];

  if (currentFilter === 'pending') filtered = filtered.filter(t => !t.completed);
  else if (currentFilter === 'overdue') filtered = filtered.filter(t => !t.completed && getDaysLeft(t.due) < 0);
  else if (currentFilter === 'done') filtered = filtered.filter(t => t.completed);

  // Sort by score descending
  filtered.sort((a, b) => calcScore(b) - calcScore(a));

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">該当するタスクはありません</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(task => {
    const score = calcScore(task);
    const daysLeft = getDaysLeft(task.due);
    const isOverdue = !task.completed && daysLeft < 0;
    const isSoon = !task.completed && daysLeft >= 0 && daysLeft <= 3;
    const bufferPct = getBufferFill(task);
    const bufferColor = getBufferColor(bufferPct);

    let dateLabel, dateClass;
    if (isOverdue) {
      dateLabel = `⚠️ ${Math.abs(daysLeft)}日超過`;
      dateClass = 'overdue';
    } else if (daysLeft === 0) {
      dateLabel = '⚡ 本日期限';
      dateClass = 'soon';
    } else if (isSoon) {
      dateLabel = `⏰ あと${daysLeft}日`;
      dateClass = 'soon';
    } else {
      dateLabel = `📅 ${task.due}（あと${daysLeft}日）`;
      dateClass = '';
    }

    const escalating = task.snoozeCount >= 2;

    return `
    <div class="task-card priority-${task.priority} ${isOverdue ? 'overdue' : ''} ${task.completed ? 'completed' : ''}" id="task-${task.id}">
      <div class="task-check ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.id}')"></div>
      <div class="task-info">
        <div class="task-title">${task.title}</div>
        <div class="task-meta">
          <span class="task-badge badge-${task.priority}">${PRIORITY_LABEL[task.priority]}</span>
          <span class="task-date ${dateClass}">${dateLabel}</span>
          ${task.assignee ? `<span class="task-date">👤 ${task.assignee}</span>` : ''}
          ${escalating ? `<span class="escalation-badge">🔴 エスカレーション</span>` : ''}
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
          <div class="buffer-bar"><div class="buffer-fill" style="width:${bufferPct}%;background:${bufferColor}"></div></div>
          <span style="font-size:0.68rem;color:var(--muted)">緊迫度 ${Math.round(bufferPct)}%</span>
          ${!task.completed ? `<button class="snooze-btn" onclick="snoozeTask('${task.id}')">スヌーズ${task.snoozeCount > 0 ? ` (${task.snoozeCount}回)` : ''}</button>` : ''}
          ${gcalConnected && !task.completed ? `<button class="gcal-btn ${task.gcalSynced ? 'synced' : ''}" onclick="syncSingleTask('${task.id}')">${task.gcalSynced ? '📅 同期済' : '📅 カレンダーへ'}</button>` : ''}
          <button class="snooze-btn" onclick="deleteTask('${task.id}')" style="color:var(--danger);border-color:rgba(255,71,87,0.3)">削除</button>
        </div>
      </div>
      <div class="score-badge ${getScoreClass(score)}">${score}</div>
    </div>`;
  }).join('');

  updateStats();
  checkAlertBanner();
}

function updateStats() {
  const overdue = tasks.filter(t => !t.completed && getDaysLeft(t.due) < 0).length;
  const soon = tasks.filter(t => !t.completed && getDaysLeft(t.due) >= 0 && getDaysLeft(t.due) <= 3).length;
  const pending = tasks.filter(t => !t.completed).length;
  const done = tasks.filter(t => t.completed).length;

  document.getElementById('count-overdue').textContent = overdue;
  document.getElementById('count-soon').textContent = soon;
  document.getElementById('count-pending').textContent = pending;
  document.getElementById('count-done').textContent = done;
}

function checkAlertBanner() {
  const overdue = tasks.filter(t => !t.completed && getDaysLeft(t.due) < 0);
  const banner = document.getElementById('alert-banner');
  const text = document.getElementById('alert-text');
  if (overdue.length > 0 && !snoozedUntil) {
    banner.style.display = 'flex';
    text.innerHTML = `<strong>${overdue.length}件</strong>のタスクが期限超過です。`;
  } else {
    banner.style.display = 'none';
  }
}

// ===== ACTIONS =====
function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.completed = !task.completed;
  if (task.completed) {
    addNotif('green', `✅ 完了`, `「${task.title}」を完了しました`);
    showToast('✅', '完了!', `「${task.title}」を完了しました`, 'success');
  }
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  renderTasks();
}

function snoozeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.snoozeCount = (task.snoozeCount || 0) + 1;
  const hours = task.snoozeCount >= 2 ? 0.5 : 1;
  if (task.snoozeCount >= 2) {
    showToast('🚨', 'エスカレーション!', `「${task.title}」のスヌーズ回数が多いため通知頻度を上げます`, 'urgent');
    addNotif('red', '🚨 エスカレーション', `「${task.title}」は${task.snoozeCount}回スヌーズされました`);
  } else {
    showToast('😴', `スヌーズ設定`, `「${task.title}」を${hours}時間後に再通知します`, 'warning');
    addNotif('orange', '😴 スヌーズ', `「${task.title}」を${hours}時間スヌーズしました`);
  }
  renderTasks();
}

function snoozeMainAlert() {
  snoozedUntil = Date.now() + 3600000;
  document.getElementById('alert-banner').style.display = 'none';
  showToast('😴', 'スヌーズ設定', 'ダッシュボードアラートを1時間停止しました', 'warning');
  setTimeout(() => { snoozedUntil = null; checkAlertBanner(); }, 3600000);
}

// ===== MODAL =====
function openModal() {
  const today = new Date();
  today.setDate(today.getDate() + 3);
  document.getElementById('task-due').value = today.toISOString().split('T')[0];
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('task-title-input').focus(), 300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function updateBufferHint() {
  const p = document.getElementById('task-priority').value;
  const days = BUFFER_DAYS[p];
  const hint = document.getElementById('buffer-hint');
  const msgs = {
    critical: `優先度「重要」のため、期限の<strong>3日前</strong>から段階的アラートを自動設定します`,
    high: `優先度「高」のため、期限の<strong>2日前</strong>から段階的アラートを自動設定します`,
    medium: `優先度「中」のため、期限の<strong>1日前</strong>から段階的アラートを自動設定します`,
    low: `優先度「低」のため、<strong>当日</strong>にアラートを設定します`
  };
  hint.innerHTML = `⏰ ${msgs[p]}`;
}

function addTask() {
  const title = document.getElementById('task-title-input').value.trim();
  const due = document.getElementById('task-due').value;
  const priority = document.getElementById('task-priority').value;
  const assignee = document.getElementById('task-assignee').value.trim();
  const memo = document.getElementById('task-memo').value.trim();

  if (!title) { showToast('⚠️', '入力エラー', 'タスク名を入力してください', 'warning'); return; }
  if (!due) { showToast('⚠️', '入力エラー', '期限日を選択してください', 'warning'); return; }

  const task = {
    id: Date.now().toString(),
    title,
    due,
    priority,
    assignee,
    memo,
    completed: false,
    snoozeCount: 0,
    createdAt: new Date().toISOString()
  };

  tasks.push(task);
  closeModal();
  renderTasks();

  const bufferDays = BUFFER_DAYS[priority];
  showToast('📝', 'タスク追加', `「${title}」を登録。期限${bufferDays > 0 ? bufferDays + '日前' : '当日'}からアラート開始`, 'success');
  addNotif('blue', '📝 タスク追加', `「${title}」を登録しました`);

  // Clear form
  document.getElementById('task-title-input').value = '';
  document.getElementById('task-assignee').value = '';
  document.getElementById('task-memo').value = '';
}

// ===== TOAST =====
function showToast(icon, title, body, type = '') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <div class="toast-icon">${icon}</div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-body">${body}</div>
    </div>
    <button class="toast-close" onclick="removeToast(this.parentElement)">✕</button>`;
  container.appendChild(toast);
  setTimeout(() => removeToast(toast), 5200);
}

function removeToast(toast) {
  if (!toast || !toast.parentElement) return;
  toast.classList.add('removing');
  setTimeout(() => toast.remove(), 300);
}

// ===== NOTIFICATION LOG =====
function addNotif(color, title, text) {
  const log = document.getElementById('notif-log');
  const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const item = document.createElement('div');
  item.className = 'notif-item';
  item.innerHTML = `
    <div class="notif-dot ${color}"></div>
    <div>
      <div class="notif-text"><strong>${title}</strong> — ${text}</div>
      <div class="notif-time">${now}</div>
    </div>`;
  if (log.children.length === 1 && log.children[0].style.textAlign === 'center') log.innerHTML = '';
  log.insertBefore(item, log.firstChild);
  while (log.children.length > 8) log.removeChild(log.lastChild);
}

// ===== PUSH NOTIFICATION =====
function requestPushPermission(btn) {
  btn.classList.toggle('on');
  if (btn.classList.contains('on') && 'Notification' in window) {
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') {
        showToast('📱', 'プッシュ通知 有効', 'スマホ・ブラウザへの通知を許可しました', 'success');
        addNotif('green', '📱 プッシュ通知', 'ブラウザ通知を許可しました');
      } else {
        showToast('⚠️', '通知が拒否されました', 'ブラウザの設定から許可してください', 'warning');
        btn.classList.remove('on');
      }
    });
  }
}

function sendPushNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('TASKFLOW — ' + title, { body, icon: '📋' });
  }
}

function filterTasks(type, btn) {

// ===== テーマ切り替え =====
function toggleTheme() {

<script>
// ===== GOOGLE CALENDAR STATE =====
let gcalConnected = false;
let gcalEmail = '';
let gcalName = '';
let syncedTaskIds = new Set();
let calViewMonth = new Date();


const GCAL_CLIENT_ID = '231430423091-7gmeqh3ve6us8cng8b2h3lhhhfqv6uvf.apps.googleusercontent.com';
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.events';
let tokenClient = null;
let gapiInited = false;
let gisInited = false;

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    gapiInited = true;
    maybeEnableButton();
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        showToast('❌', 'エラー', '認証に失敗しました', 'urgent');
        return;
      }
      // 認証成功
      const profile = await getGoogleProfile();
      gcalConnected = true;
      gcalEmail = profile.email || 'your@gmail.com';
      gcalName = profile.name || 'あなた';
      onGCalConnected();
    },
  });
  gisInited = true;
  maybeEnableButton();
}

function maybeEnableButton() {
  if (gapiInited && gisInited) {
    const btn = document.getElementById('gcal-header-btn');
    if (btn) btn.disabled = false;
  }
}

async function getGoogleProfile() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${gapi.client.getToken().access_token}` }
    });
    return await res.json();
  } catch { return {}; }
}

// ===== DEMO AUTH（Client IDが未設定の場合のフォールバック）=====
function demoGoogleAuth() {
  if (GCAL_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') {
    showToast('🔐', 'Googleアカウント認証中...', 'ポップアップで認証画面を開いています', '');
    setTimeout(() => {
      gcalConnected = true;
      gcalEmail = 'yourname@gmail.com';
      gcalName = 'あなたの名前';
      onGCalConnected();
    }, 1800);
    return;
  }
  // gapiがまだ読み込まれていない場合
  if (!gapiInited || !gisInited) {
    showToast('⏳', 'もう少し待ってください', 'Googleの準備中です。5秒後にもう一度押してください', 'warning');
    return;
  }
  // 本物の認証
  closeCalModal();
  if (gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

function onGCalConnected() {
  // Update UI

  const btn = document.getElementById('gcal-header-btn');

  renderMiniCal();
  renderSyncedList();

  showToast('✅', 'Googleカレンダー接続完了！', `${gcalEmail} と連携しました`, 'success');
  addNotif('green', '📅 カレンダー接続', `${gcalEmail} で認証完了`);

  setTimeout(() => openCalModalConnected(), 800);
}

function disconnectGCal() {
  if (GCAL_CLIENT_ID !== 'YOUR_CLIENT_ID_HERE' && gapi.client.getToken()) {
    google.accounts.oauth2.revoke(gapi.client.getToken().access_token);
    gapi.client.setToken('');
  }
  gcalConnected = false;
  syncedTaskIds.clear();
  closeCalModal();
  document.getElementById('gcal-connect-bar').style.display = 'flex';

  const btn = document.getElementById('gcal-header-btn');
  btn.style.background = '';
  btn.style.borderColor = 'rgba(66,133,244,0.4)';
  btn.style.color = '#4285f4';
  btn.textContent = '📅 Googleカレンダー連携';

  document.getElementById('gcal-sidebar-disconnected').style.display = 'block';
  document.getElementById('gcal-sidebar-connected').style.display = 'none';

  showToast('⚠️', '接続解除しました', 'Googleカレンダーとの連携を解除しました', 'warning');
  addNotif('orange', '📅 接続解除', 'Googleカレンダー連携を解除しました');
  renderTasks();
}

// ===== 本物のカレンダー登録 =====
async function addEventToGoogleCalendar(task) {
  if (GCAL_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') {
    // デモモード：擬似的に成功
    return true;
  }
  try {
    const bufferDays = BUFFER_DAYS[task.priority];
    const event = {
      summary: `【TASKFLOW】${task.title}`,
      description: `優先度: ${PRIORITY_LABEL[task.priority]}\n担当: ${task.assignee || 'なし'}\nメモ: ${task.memo || 'なし'}`,
      start: { date: task.due },
      end: { date: task.due },
      reminders: {
        useDefault: false,
        overrides: bufferDays > 0 ? [
          { method: 'popup', minutes: bufferDays * 24 * 60 },
          { method: 'popup', minutes: 24 * 60 },
          { method: 'popup', minutes: 60 },
        ] : [
          { method: 'popup', minutes: 60 },
        ],
      },
      colorId: task.priority === 'critical' ? '11' : task.priority === 'high' ? '6' : '9',
    };
    await gapi.client.calendar.events.insert({
      calendarId: 'primary',
      resource: event,
    });
    return true;
  } catch (err) {
    console.error('Calendar API error:', err);
    return false;
  }
}

// ===== CAL MODAL =====
function openCalModal() {
  if (gcalConnected) {
    openCalModalConnected();
  } else {
    document.getElementById('cal-view-connect').style.display = 'block';
    document.getElementById('cal-view-connected').style.display = 'none';
    document.getElementById('cal-modal-overlay').classList.add('show');
  }
}

function openCalModalConnected() {
  document.getElementById('cal-view-connect').style.display = 'none';
  document.getElementById('cal-view-connected').style.display = 'block';
  document.getElementById('cal-modal-name').textContent = gcalName;
  document.getElementById('cal-modal-email').textContent = gcalEmail;

  const pending = tasks.filter(t => !t.completed);
  const list = document.getElementById('cal-task-checklist');
  if (pending.length === 0) {
    list.innerHTML = '<div style="font-size:0.78rem;color:var(--muted);text-align:center;padding:16px">未完了のタスクがありません</div>';
  } else {
    list.innerHTML = pending.map(t => `
      <div class="cal-task-item">
        <div class="cal-task-check ${syncedTaskIds.has(t.id) ? 'checked' : ''}" id="calcheck-${t.id}" onclick="toggleCalCheck('${t.id}')"></div>
        <div class="cal-task-name">${t.title}</div>
        <div class="cal-task-date">${t.due}</div>
        <span class="task-badge badge-${t.priority} cal-task-badge">${PRIORITY_LABEL[t.priority]}</span>
      </div>`).join('');
  }

  document.getElementById('cal-modal-overlay').classList.add('show');
}

function closeCalModal() {
  document.getElementById('cal-modal-overlay').classList.remove('show');
}

function toggleCalCheck(id) {
  const el = document.getElementById(`calcheck-${id}`);
  if (syncedTaskIds.has(id)) {
    syncedTaskIds.delete(id);
    el.classList.remove('checked');
  } else {
    syncedTaskIds.add(id);
    el.classList.add('checked');
  }
}

// ===== SYNC =====
async function doSync() {
  const toSync = tasks.filter(t => !t.completed && syncedTaskIds.has(t.id));
  if (toSync.length === 0) {
    tasks.filter(t => !t.completed).forEach(t => syncedTaskIds.add(t.id));
  }
  closeCalModal();
  runSyncAnimation();
}

function runSyncAnimation() {
  const overlay = document.getElementById('syncing-overlay');
  overlay.classList.add('show');
  const steps = [1,2,3,4,5];
  steps.forEach((n, i) => {
    setTimeout(() => {
      const el = document.getElementById(`step-${n}`);
      el.classList.add('active');
      if (i > 0) {
        document.getElementById(`step-${i}`).classList.remove('active');
        document.getElementById(`step-${i}`).classList.add('done');
      }
    }, i * 700);
  });
  setTimeout(async () => {
    document.getElementById('step-5').classList.remove('active');
    document.getElementById('step-5').classList.add('done');

    // 本物のカレンダー登録
    const toSync = tasks.filter(t => !t.completed && syncedTaskIds.has(t.id));
    for (const task of toSync) {
      await addEventToGoogleCalendar(task);
      task.gcalSynced = true;
    }

    setTimeout(() => {
      overlay.classList.remove('show');
      steps.forEach(n => {
        document.getElementById(`step-${n}`).classList.remove('active','done');
      });
      onSyncComplete();
    }, 600);
  }, 5 * 700 + 200);
}

function onSyncComplete() {
  tasks.filter(t => !t.completed).forEach(t => {
    syncedTaskIds.add(t.id);
    t.gcalSynced = true;
  });
  renderTasks();
  renderSyncedList();
  renderMiniCal();
  showToast('📅', '同期完了！', `${syncedTaskIds.size}件のタスクをGoogleカレンダーに登録しました`, 'success');
  addNotif('green', '📅 同期完了', `${syncedTaskIds.size}件をカレンダーに登録`);
  sendPushNotification('カレンダー同期完了', `${syncedTaskIds.size}件のタスクを登録しました`);
}

// ===== MINI CALENDAR =====
function renderMiniCal() {
  const cal = document.getElementById('mini-cal');
  const y = calViewMonth.getFullYear();
  const m = calViewMonth.getMonth();
  const monthStr = `${y}年${m+1}月`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();

  const taskDates = {};
  tasks.filter(t => !t.completed).forEach(t => {
    const d = new Date(t.due);
    if (d.getFullYear() === y && d.getMonth() === m) {
      const day = d.getDate();
      const isOverdue = getDaysLeft(t.due) < 0;
      taskDates[day] = isOverdue ? 'overdue' : 'task';
    }
  });

  let html = `
    <div class="mini-cal-header">
      <button class="mini-cal-nav" onclick="changeCalMonth(-1)">‹</button>
      <div class="mini-cal-month">${monthStr}</div>
      <button class="mini-cal-nav" onclick="changeCalMonth(1)">›</button>
    </div>
    <div class="mini-cal-grid">
      ${['日','月','火','水','木','金','土'].map(d => `<div class="mini-cal-day-label">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div class="mini-cal-day empty"></div>').join('')}
      ${Array.from({length: daysInMonth}, (_,i) => {
        const day = i+1;
        const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===day;
        const hasTask = taskDates[day];
        return `<div class="mini-cal-day ${isToday?'today':''} ${hasTask==='overdue'?'has-overdue':hasTask?'has-task':''}">${day}</div>`;
      }).join('')}
    </div>`;
  cal.innerHTML = html;
}

function changeCalMonth(dir) {
  calViewMonth = new Date(calViewMonth.getFullYear(), calViewMonth.getMonth() + dir, 1);
  renderMiniCal();
}

function renderSyncedList() {
  const list = document.getElementById('gcal-synced-list');
  const synced = tasks.filter(t => syncedTaskIds.has(t.id) && !t.completed).slice(0,5);
  if (synced.length === 0) {
    list.innerHTML = '<div style="font-size:0.72rem;color:var(--muted)">同期済みタスクなし</div>';
    return;
  }
  list.innerHTML = synced.map(t => {
    const isOverdue = getDaysLeft(t.due) < 0;
    return `<div class="gcal-synced-item ${isOverdue?'overdue':''}">
      <span style="font-size:0.8rem">${isOverdue?'🔴':'📅'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span>
      <span style="color:var(--muted);flex-shrink:0">${t.due.slice(5)}</span>
    </div>`;
  }).join('');
}

function syncSingleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || !gcalConnected) return;
  if (task.gcalSynced) {
    showToast('📅', '同期済み', `「${task.title}」はすでにカレンダーに登録されています`, '');
    return;
  }
  addEventToGoogleCalendar(task).then(success => {
    if (success) {
      task.gcalSynced = true;
      syncedTaskIds.add(id);
      renderTasks();
      renderSyncedList();
      renderMiniCal();
      const bufferDays = BUFFER_DAYS[task.priority];
      showToast('📅', 'カレンダーに登録しました', `期限日${bufferDays > 0 ? 'の'+bufferDays+'日前' : '当日'}にリマインダーを設定`, 'success');
      addNotif('green', '📅 カレンダー登録', `「${task.title}」を${task.due}に追加`);
    }
  });
}
